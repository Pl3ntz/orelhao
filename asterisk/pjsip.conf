[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
; container atrás de NAT do Docker: anuncia localhost pro host e marca a rede interna
local_net=172.16.0.0/12
external_media_address=127.0.0.1
external_signaling_address=127.0.0.1

[transport-tcp]
; INVITEs grandes (>1300 bytes) fazem o PJSIP migrar pra TCP (RFC 3261 18.1.1)
type=transport
protocol=tcp
bind=0.0.0.0:5060
local_net=172.16.0.0/12
external_media_address=127.0.0.1
external_signaling_address=127.0.0.1

[endpoint-template](!)
type=endpoint
context=internal
disallow=all
allow=opus,ulaw
direct_media=no
force_rport=yes
rtp_symmetric=yes
rewrite_contact=yes

[auth-template](!)
type=auth
auth_type=userpass

[aor-template](!)
type=aor
max_contacts=5

[6001](endpoint-template)
auth=6001
aors=6001

[6001](auth-template)
username=6001
password=test6001

[6001](aor-template)

[6002](endpoint-template)
auth=6002
aors=6002

[6002](auth-template)
username=6002
password=test6002

[6002](aor-template)
